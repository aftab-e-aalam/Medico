<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="{{url_for('static',filename='login.css')}}">
    <link rel="stylesheet" href="{{url_for('static',filename='styles.css')}}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <title>Login & Register</title>
</head>

<body>
    <header>
        <div class="Logo"></div>
        <nav>
            <a href="{{url_for('home')}}">Home</a>
            <a href="{{url_for('hospitals')}}">Hospital</a>
            <a href="{{url_for('doctors')}}">Doctors</a>
            <a href="{{url_for('treatment')}}">Treatment</a>
        </nav>
        <a href="{{url_for('login')}}"><button type="button" class="btn btn-info">login</button></a>
    </header>
    <div class="body">
        <div class="container">

            <div id="registerForm">
                <h2>Register</h2>
                <form method="POST">
                    <input type="text" name="name" placeholder="Full Name" required>
                    <input type="email" name='email' placeholder="Email" required>
                    <input type="password" name="password" placeholder="Password" required>

                    <p>{{message}}</p>

                    <button>Register</button>
                </form>
                <div class="toggle"><a href="{{url_for('login')}}">Already have an account ? Login</a></div>
            </div>

        </div>
    </div>
    <footer>
        <div class="footer-content">
            <div class="social">
                <a href="https://github.com/aftab-e-aalam" target="_blank"><i class="bi bi-github"></i></a>
                <i type="button" class="bi bi-linkedin"></i>
                <i class="bi bi-instagram"></i>
            </div>

            <div class="quick">
                <a href="{{url_for('home')}}">Home</a>
                <a href="{{url_for('hospitals')}}">Hospital</a>
                <a href="{{url_for('doctors')}}">Doctors</a>
                <a href="{{url_for('treatment')}}">Treatment</a>
            </div>
            <div class="copyright">© 2026 All Right Rerserved by Team </div>
            <div>Contributers</div>
            <div class="contributers">
                <p>Aftab Vatsala Nirbhay Bhavika</p>
            </div>
        </div>

    </footer>

    <script src="{{url_for('static',filename='login.js')}}"></script>
    <script src="{{url_for('static',filename='script.js')}}"></script>
    <script src="{{url_for('static',filename='script.js')}}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
